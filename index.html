    <header>
        <div class="bg-[#c5e2fc] flex flex-col md:flex-row justify-around items-center p-5 gap-4">

            <button class="text-white font-semibold fontsize-[14px] bg-[#422AD5] border-2 border-[#422AD5] rounded px-4 py-2 cursor-pointer">Get Started</button>
